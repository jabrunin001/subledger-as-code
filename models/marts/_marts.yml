version: 2

models:
  - name: dim_account
    columns:
      - name: account_id
        data_tests: [not_null, unique]
  - name: dim_loan
    columns:
      - name: loan_id
        data_tests: [not_null, unique]
  - name: fct_journal_lines
    columns:
      - name: journal_line_id
        data_tests: [not_null, unique]
      - name: account_id
        data_tests:
          - relationships: { to: ref('dim_account'), field: account_id }
      - name: loan_id
        data_tests:
          - relationships: { to: ref('dim_loan'), field: loan_id }
      - name: event_type
        data_tests:
          - accepted_values: { values: ['origination', 'payment', 'charge_off'] }
  - name: fct_balance_rollforward
    description: "Source-to-ledger reconciliation. expected_ending is re-derived from source events; ledger_ending comes from the journal. Equality per account is the substantive SOX control."
    columns:
      - name: account_id
        data_tests: [not_null, unique]
