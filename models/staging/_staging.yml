version: 2

models:
  - name: stg_originations
    columns:
      - name: event_id
        data_tests: [not_null, unique]
      - name: event_type
        data_tests:
          - accepted_values: { values: ['origination'] }
  - name: stg_payments
    columns:
      - name: event_id
        data_tests: [not_null, unique]
      - name: event_type
        data_tests:
          - accepted_values: { values: ['payment'] }
  - name: stg_charge_offs
    columns:
      - name: event_id
        data_tests: [not_null, unique]
      - name: event_type
        data_tests:
          - accepted_values: { values: ['charge_off'] }
