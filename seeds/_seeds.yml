version: 2

seeds:
  - name: chart_of_accounts
    config:
      column_types:
        account_id: varchar
        account_name: varchar
        account_type: varchar
        normal_balance: varchar
    columns:
      - name: account_id
        data_tests: [not_null, unique]
      - name: account_type
        data_tests:
          - accepted_values:
              values: ['asset', 'liability', 'revenue', 'expense']
      - name: normal_balance
        data_tests:
          - accepted_values:
              values: ['debit', 'credit']

  - name: posting_rules
    config:
      column_types:
        event_type: varchar
        leg: integer
        account_id: varchar
        dr_cr: varchar
        amount_source: varchar
    columns:
      - name: account_id
        data_tests:
          - relationships:
              to: ref('chart_of_accounts')
              field: account_id
      - name: dr_cr
        data_tests:
          - accepted_values:
              values: ['debit', 'credit']
      - name: amount_source
        data_tests:
          - accepted_values:
              values: ['principal', 'interest', 'total']
      - name: event_type
        data_tests:
          - accepted_values:
              values: ['origination', 'payment', 'charge_off']
